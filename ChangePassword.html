<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubah Password - Expense System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="api.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .change-password-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h2 {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .btn-change {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="change-password-container">
        <div class="header">
            <h2><i class="bi bi-shield-lock"></i> Ubah Password</h2>
            <p class="text-muted">Untuk keamanan, silakan ubah password default Anda</p>
        </div>

        <div id="alertMessage" class="alert" style="display: none;"></div>

        <form id="changePasswordForm">
            <div class="mb-3">
                <label class="form-label">Password Lama</label>
                <input type="password" class="form-control" id="oldPassword" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password Baru</label>
                <input type="password" class="form-control" id="newPassword" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Konfirmasi Password Baru</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn-change" id="changeBtn">
                <i class="bi bi-check-circle"></i> Ubah Password
            </button>
        </form>
    </div>

    <script>
    const user = JSON.parse(sessionStorage.getItem('user'));
    if (!user) {
        window.location.href = '/login.html';
    }

    document.getElementById('changePasswordForm').onsubmit = async function(e) {
        e.preventDefault();
        
        const oldPassword = document.getElementById('oldPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const changeBtn = document.getElementById('changeBtn');
        const alertDiv = document.getElementById('alertMessage');
        
        if (newPassword !== confirmPassword) {
            alertDiv.className = 'alert alert-danger';
            alertDiv.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Password baru tidak cocok!';
            alertDiv.style.display = 'block';
            return;
        }
        
        if (newPassword.length < 6) {
            alertDiv.className = 'alert alert-danger';
            alertDiv.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Password minimal 6 karakter!';
            alertDiv.style.display = 'block';
            return;
        }
        
        changeBtn.disabled = true;
        changeBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Mengubah...';
        
        try {
            const result = await fetch('/api/auth/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: user.email,
                    oldPassword: oldPassword,
                    newPassword: newPassword
                })
            });
            
            const data = await result.json();
            
            if (data.success) {
                alertDiv.className = 'alert alert-success';
                alertDiv.innerHTML = '<i class="bi bi-check-circle"></i> Password berhasil diubah! Silakan login kembali.';
                alertDiv.style.display = 'block';
                
                setTimeout(() => {
                    sessionStorage.removeItem('user');
                    window.location.href = '/login.html';
                }, 2000);
            } else {
                alertDiv.className = 'alert alert-danger';
                alertDiv.innerHTML = '<i class="bi bi-exclamation-triangle"></i> ' + (data.error || 'Gagal mengubah password');
                alertDiv.style.display = 'block';
                changeBtn.disabled = false;
                changeBtn.innerHTML = '<i class="bi bi-check-circle"></i> Ubah Password';
            }
        } catch (error) {
            alertDiv.className = 'alert alert-danger';
            alertDiv.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Gagal terhubung ke server';
            alertDiv.style.display = 'block';
            changeBtn.disabled = false;
            changeBtn.innerHTML = '<i class="bi bi-check-circle"></i> Ubah Password';
        }
    };
    </script>
</body>
</html>
